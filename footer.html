<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <style>
   .site-footer {
    background: #1A202C;
    color: #A0AEC0;
    padding: 15px 0;
    text-align: center;
    width: 100%;
    margin-top: 50px;
    border-top: 4px solid #FF7B54;
    font-family: 'Cairo', sans-serif;
}

.footer-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

.footer-container p { margin: 0; font-size: 15px; font-weight: 600; }
.footer-divider { color: #4A5568; font-size: 18px; }
.footer-container strong { color: #FF7B54; font-weight: 800; }

@media (max-width: 768px) {
    .footer-container { flex-direction: column; gap: 8px; }
    .footer-divider { display: none; }
}
  </style>
</head>
<body>
  <footer class="site-footer">
    <div class="footer-container">
        <p>&copy; جميع الحقوق محفوظة لعام 2026.</p>
        <span class="footer-divider">|</span>
        <p>تصميم <strong>Hummy Cake</strong> بشكل فاخر</p>
    </div>
</footer>
</body>
</html>
